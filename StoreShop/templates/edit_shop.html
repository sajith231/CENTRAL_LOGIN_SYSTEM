{% extends 'base.html' %}
{% block title %}Edit Shop{% endblock %}
{% block header_title %}<strong>Shop</strong><span class="muted"> / edit</span>{% endblock %}
{% block active_shop %}active{% endblock %}

{% block content %}
<div class="card" style="padding:20px;">
    <h2 style="color:white;">Edit Shop</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- Branch -->
        <div class="mb-3">
            <label>Branch</label>
            <select name="branch" id="branchSelect" class="form-control" required
                style="background:#0f1b31; color:white; border:1px solid #334155;">
                {% for branch in branches %}
                <option value="{{ branch.id }}" {% if shop.branch == branch %}selected{% endif %}>
                    {{ branch.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Store -->
        <div class="mb-3">
            <label>Corporate</label>
            <select name="store" id="storeSelect" class="form-control" required
                style="background:#0f1b31; color:white; border:1px solid #334155;">
                {% for store in stores %}
                <option value="{{ store.id }}" data-branch="{{ store.branch_id }}" {% if shop.store == store %}selected{% endif %}>
                    {{ store.name }}{% if store.place %} - {{ store.place }}{% endif %}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Shop Name -->
        <div class="mb-3">
            <label>Company Name</label>
            <input type="text" name="name" value="{{ shop.name }}" class="form-control" required
                style="background:#0f1b31; color:white; border:1px solid #334155;">
        </div>

        <!-- Place -->
        <div class="mb-3">
            <label>Place</label>
            <input type="text" name="place" value="{{ shop.place }}" class="form-control" required
                style="background:#0f1b31; color:white; border:1px solid #334155;">
        </div>

        <!-- Contact No -->
        <div class="mb-3">
            <label>Contact Number</label>
            <input type="text" name="contact_no" value="{{ shop.contact_no }}" class="form-control"
                style="background:#0f1b31; color:white; border:1px solid #334155;">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" value="{{ shop.email }}" class="form-control"
                style="background:#0f1b31; color:white; border:1px solid #334155;">
        </div>

        <!-- Status -->
        <div class="mb-3 form-check">
            <input type="checkbox" name="is_active" id="is_active" class="form-check-input" {% if shop.is_active%}checked{% endif %}>
            <label for="is_active" class="form-check-label">Active</label>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const branchSelect = document.getElementById("branchSelect");
        const storeSelect = document.getElementById("storeSelect");
        
        if (branchSelect && storeSelect) {
            const allStoreOptions = Array.from(storeSelect.options);
            const initialStoreId = storeSelect.value; // Store the initial selection

            branchSelect.addEventListener("change", function () {
                const branchId = this.value;
                const currentVal = storeSelect.value;
                storeSelect.innerHTML = '';

                allStoreOptions.forEach(opt => {
                    const bId = opt.getAttribute("data-branch");
                    if (!opt.value) {
                        storeSelect.appendChild(opt.cloneNode(true));
                        return;
                    }
                    if (!branchId || bId === branchId) {
                        storeSelect.appendChild(opt.cloneNode(true));
                    }
                });

                // Try to keep the previously selected value if still available
                storeSelect.value = currentVal;
            });
            
            // Trigger filtering on page load to limit options to only the selected branch
            branchSelect.dispatchEvent(new Event('change'));
            
            // Explicitly set the value to initial selection on load properly
            if (initialStoreId) {
                storeSelect.value = initialStoreId;
            }
        }
    });
</script>
{% endblock %}
